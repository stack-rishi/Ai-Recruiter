ai_usage_summary: |
  Used Claude as AI coding assistants for architecture discussion and code review. No candidate data was fed to
  any external LLM during ranking inference. The pipeline runs entirely offline
  with local models (BGE-Small, MiniLM Cross-Encoder).

methodology_summary: |
  Multi-stage retrieval and ranking pipeline processing 100K candidates in under
  60 seconds on CPU. Stage 1: Dense retrieval with BGE-Small embeddings (cosine
  similarity, top 3000). Stage 2: Skill-based Personalized PageRank knowledge
  graph. Stage 3: BM25 lexical scoring with pseudo-relevance feedback query
  expansion. Stage 4: Cross-Encoder semantic re-ranking (top 300). Stage 5:
  Career evidence bonuses, domain penalties, honeypot detection, and recruiter
  response rate multipliers. Reasoning is grounded in actual candidate profile
  data with rank-banded tone and honest concerns.

